<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>NewsroomAgent</title>

    <style>
        #script {
            max-width: 50ch;
            white-space: pre-wrap;
            overflow-wrap: break-word;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 1rem;
            background: #f7f7f7;
        }
  </style>
</head>

<body>
    <h1>NewsroomAgent</h1>

    <input id="topic" size="60" placeholder="What elections happened in India in 2026?" />
    <button id="run">Run</button>

    <!-- NODE PROGRESS FRAMES TO GO HERE -->
    <h2>Progress</h2>
    <ul id="log"></ul>

    <h2>Script</h2>
    <pre id="script"></pre>

    <script>
        const topicInput = document.getElementById("topic");
        const runButton = document.getElementById("run");
        const log = document.getElementById("log");
        const scriptOut = document.getElementById("script");

        let eventSource = null;

        runButton.onclick = () => {
            const topic = topicInput.value.trim();
            if (!topic) return;

            // CLOSE ANY OLD STREAM FOR A CLEAN SLATE
            if (eventSource) eventSource.close();
            log.innerHTML = "";
            scriptOut.textContent = "";

            // OPEN THE STREAM. encodeURIComponent KEEPS SPACES AND ? FROM BREAKING THE URL.
            eventSource = new EventSource(`/stream?topic=${encodeURIComponent(topic)}`);

            // FIRES ONCE PER data
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);

                // LOOKS FOR FINAL FRAME AND STOPS LISTENING.
                if (data.done) {
                    scriptOut.textContent = data.script;
                    eventSource.close();
                    return;
                }

                // OTHERWISE NODE PROGRESS FRAME GETS ADDED TO LOG.
                const li = document.createElement("li");
                // HEADER
                const header = document.createElement("strong");
                header.textContent = `step ${data.step}: ${data.node}`;
                li.appendChild(header);

                // ONE LINE PER FIELD THE NODE CHANGED, MATCHES CLI OUTPUT
                for (const [key, value] of Object.entries(data.changes || {})) {
                    const detail = document.createElement("div");
                    detail.style.marginLeft = "1.5rem";
                    detail.style.whiteSpace = "pre-wrap";
                    detail.textContent = `${key}: ${value}`;
                    li.appendChild(detail);
                }

                log.appendChild(li);
            };

            eventSource.onerror = () => {
                if (eventSource) eventSource.close();
            };
        };
    </script>

</body>
</html>
